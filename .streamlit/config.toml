[theme]
base = "light"
primaryColor = "#004C91"
backgroundColor = "#F8FAFC"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#111827"
font = "sans serif"

[client]
showSidebarNavigation = false
showErrorDetails = "none"

[server]
enableCORS = false
enableXsrfProtection = true
headless = true

[browser]
gatherUsageStats = false
