name: Export Presentation PDF

on:
  push:
    branches: [main]
    paths:
      - 'docs/presentation.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Generate PDF
        run: node scripts/export-pdf.js

      - name: Commit PDF
        run: |
          git config user.email "noreply@anthropic.com"
          git config user.name "Claude"
          git add docs/presentation.pdf
          git diff --staged --quiet || git commit -m "chore: regenerate presentation PDF [skip ci]"
          git push
